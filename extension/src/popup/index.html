<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CoWatch</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="brand">
      <span class="status-dot" aria-hidden="true"></span>
      <span class="wordmark">COWATCH</span>
    </div>

    <div id="loading-view" role="status">Checking this tab…</div>

    <div id="create-view" hidden>
      <p id="no-video-message" hidden>No video detected on this page.</p>
      <label>
        <span class="field-label">Control</span>
        <select id="control-mode">
          <option value="open">Anyone can control</option>
          <option value="host-only">Only I can control</option>
        </select>
      </label>
      <button id="create-room-btn">Create Room</button>
    </div>

    <div id="room-view" hidden>
      <p>Room active</p>
      <input id="join-url" type="text" readonly />
      <button id="copy-link-btn">Copy Link</button>
      <span id="expiry-note">Link expires in 10 minutes</span>
      <button id="leave-room-btn">Leave Room</button>
    </div>

    <p id="status" role="status" aria-live="polite"></p>

    <script src="index.js"></script>
  </body>
</html>
